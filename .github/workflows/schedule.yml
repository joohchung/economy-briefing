name: 경제 브리핑 자동 생성

on:
  schedule:
    - cron: '0 23 * * 0-4'   # 평일 KST 08:00 (UTC 전날 23:00)
  workflow_dispatch:           # 수동 실행 버튼

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 브리핑 생성
        env:
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
        run: node generate.mjs

      - name: 결과 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/briefing.json
          git diff --staged --quiet || git commit -m "브리핑 업데이트: $(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M KST')"
          git push
